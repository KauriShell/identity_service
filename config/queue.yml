default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: kyc
      threads: 2
      processes: <%= ENV.fetch("KYC_JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    - queues: default
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
