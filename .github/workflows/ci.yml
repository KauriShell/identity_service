name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: identity_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d identity_service_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      CI: true
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/identity_service_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/identity_service_test
      DEVISE_JWT_SECRET_KEY: test-secret
      DEVISE_PEPPER: test-pepper
      SERVICE_TOKEN_SALT: test-salt
      REDIS_URL: redis://localhost:6379/1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_BUCKET: test-bucket
      AWS_KMS_KEY_ID: test-kms
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - run: bundle exec rails db:test:prepare
      - run: bundle exec rspec
