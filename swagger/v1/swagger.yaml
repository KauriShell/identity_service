---
openapi: 3.0.1
info:
  title: Identity Service API
  version: v1
  description: 'JSON API for authentication, users, KYC, and service tenants. Authenticated
    requests use `Authorization: Bearer <JWT>` unless noted.'
servers:
- url: http://localhost:3000
  description: Local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    jsonApiError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              title:
                type: string
              detail:
                type: string
              source:
                type: object
    jsonApiUserData:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              format: uuid
            type:
              type: string
            attributes:
              type: object
        meta:
          type: object
paths:
  "/api/v1/auth/sign_in":
    post:
      summary: Sign in
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: signed in
        '401':
          description: invalid credentials or unconfirmed email
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_v1_user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      format: password
                  required:
                  - email
                  - password
              required:
              - api_v1_user
  "/api/v1/auth/sign_out":
    delete:
      summary: Sign out
      tags:
      - Auth
      description: Revokes the current access JWT (denylist). Send the same Bearer
        token used for API calls.
      security:
      - bearerAuth: []
      responses:
        '204':
          description: signed out
  "/api/v1/auth/sign_up":
    post:
      summary: Register
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: registered
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_v1_user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
              required:
              - api_v1_user
  "/api/v1/auth/refresh":
    post:
      summary: Refresh tokens
      tags:
      - Auth
      description: Exchange a refresh token for new access and refresh tokens. No
        Bearer header required.
      parameters: []
      responses:
        '200':
          description: tokens issued
        '401':
          description: invalid or expired refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Opaque refresh token from sign-in or prior refresh
              required:
              - refreshToken
  "/api/v1/auth/password":
    post:
      summary: Request password reset
      tags:
      - Auth
      description: Sends reset instructions when paranoid mode is off; with paranoid
        enabled, response is the same whether or not the email exists.
      parameters: []
      responses:
        '200':
          description: instructions sent (or generic success if paranoid)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_v1_user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                  required:
                  - email
              required:
              - api_v1_user
    patch:
      summary: Reset password
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: password updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_v1_user:
                  type: object
                  properties:
                    reset_password_token:
                      type: string
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required:
                  - reset_password_token
                  - password
                  - password_confirmation
              required:
              - api_v1_user
  "/api/v1/auth/confirmation":
    get:
      summary: Confirm email
      tags:
      - Auth
      parameters:
      - name: confirmation_token
        in: query
        required: true
        description: Token from the confirmation email
        schema:
          type: string
      responses:
        '200':
          description: confirmed
    post:
      summary: Resend confirmation
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: confirmation email enqueued
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_v1_user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                  required:
                  - email
              required:
              - api_v1_user
  "/api/v1/auth/unlock":
    get:
      summary: Unlock account (link from email)
      tags:
      - Auth
      parameters:
      - name: unlock_token
        in: query
        required: true
        schema:
          type: string
      responses:
        '200':
          description: unlocked
    post:
      summary: Request unlock email
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: unlock email sent (or generic success)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_v1_user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                  required:
                  - email
              required:
              - api_v1_user
  "/api/v1/health":
    get:
      summary: Health check
      tags:
      - Health
      responses:
        '200':
          description: ok
  "/api/v1/kyc/submit":
    post:
      summary: Submit KYC documents
      tags:
      - KYC
      description: 'Multipart upload: document type plus one or more files (PDF/images
        per server rules).'
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: verification created
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
        required: true
        description: Supported types include passport, drivers_license (see server
          validation).
  "/api/v1/kyc/status":
    get:
      summary: Current KYC status
      tags:
      - KYC
      security:
      - bearerAuth: []
      responses:
        '200':
          description: status
  "/api/v1/kyc":
    get:
      summary: List pending KYC reviews
      tags:
      - KYC
      description: 'Admin: paginated queue of submitted and under_review verifications.'
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: size
        in: query
        required: false
        description: Max 100
        schema:
          type: integer
      responses:
        '200':
          description: page of verifications
  "/api/v1/kyc/{id}/review":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    patch:
      summary: Review verification
      tags:
      - KYC
      description: 'Admin: approve or reject a verification and sync user kyc_status.'
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: review saved
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                kyc:
                  type: object
                  properties:
                    status:
                      type: string
                      enum:
                      - approved
                      - rejected
                      - under_review
                    notes:
                      type: string
                  required:
                  - status
              required:
              - kyc
  "/api/v1/service_tenants":
    get:
      summary: List service tenants
      tags:
      - Service tenants
      description: Superadmin only.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: tenants listed
    post:
      summary: Create service tenant
      tags:
      - Service tenants
      description: Superadmin only. Returns a one-time raw service token in `meta.serviceToken`.
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: tenant created
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service_tenant:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                  required:
                  - name
              required:
              - service_tenant
  "/api/v1/service_tenants/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Show service tenant
      tags:
      - Service tenants
      security:
      - bearerAuth: []
      responses:
        '200':
          description: tenant found
    patch:
      summary: Update service tenant
      tags:
      - Service tenants
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service_tenant:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    active:
                      type: boolean
              required:
              - service_tenant
    delete:
      summary: Deactivate service tenant
      tags:
      - Service tenants
      description: Sets active to false (soft deactivate).
      security:
      - bearerAuth: []
      responses:
        '204':
          description: deactivated
  "/api/v1/users":
    get:
      summary: List users
      tags:
      - Users
      description: Admin and superadmin only. Returns all users with optional metadata
        on each record.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: users listed
        '403':
          description: forbidden for members
  "/api/v1/users/{id}":
    parameters:
    - name: id
      in: path
      format: uuid
      required: true
      schema:
        type: string
    get:
      summary: Show user
      tags:
      - Users
      description: Members see their own profile (private attributes). Admins see
        full user including metadata when viewing others.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: user found
    patch:
      summary: Update user
      tags:
      - Users
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    phone_number:
                      type: string
                    metadata:
                      type: object
                    status:
                      type: string
                    kyc_status:
                      type: string
                    role:
                      type: string
                  description: Admins may set status, kyc_status, metadata; superadmin
                    may set role.
              required:
              - user
    delete:
      summary: Soft-delete user
      tags:
      - Users
      description: Admin or superadmin only. Discards the user, revokes tokens, and
        rotates JWT identifier.
      security:
      - bearerAuth: []
      responses:
        '204':
          description: deleted
